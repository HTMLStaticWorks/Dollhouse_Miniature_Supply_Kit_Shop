<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <title>Coming Soon - Dollhouse Miniature Shop</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?q=80&w=1600&auto=format&fit=crop');

            background-position: center;

            align-items: center;
            justify-content: center;

            color: white;
            margin: 0;
        }
        .countdown {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 50px 0;
        }
        .count-item {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            min-width: 100px;
        }
        .count-item span {
            display: block;
            font-size: 2.5rem;
            font-weight: 800;
        }
        .count-item label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .coming-soon-box {
            max-width: 700px;
            padding: 40px;
        }
    </style>
</head>
<body>

    <div class="coming-soon-box">
        <a href="index.html" class="logo" style="font-size: 2.5rem; margin-bottom: 30px; justify-content: center;">

        </a>

        <div class="countdown">
            <div class="count-item"><span id="days">12</span><label>Days</label></div>

        </div>
        
        <form class="newsletter-form" style="max-width: 500px; margin: 0 auto 40px;">
            <input type="email" placeholder="Email Address" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white;" required>
            <button type="submit" class="btn btn-primary" style="background: white; color: black;">Notify Me</button>
        </form>
        
        <div class="social-links" style="justify-content: center;">
            <a href="#" style="background: rgba(255,255,255,0.1); color: white;"><i class="fab fa-facebook-f"></i></a>
            <a href="#" style="background: rgba(255,255,255,0.1); color: white;"><i class="fab fa-instagram"></i></a>
            <a href="#" style="background: rgba(255,255,255,0.1); color: white;"><i class="fa-brands fa-x-twitter"></i></a>
            <a href="#" style="background: rgba(255,255,255,0.1); color: white;"><i class="fab fa-youtube"></i></a>
        </div>
    </div>

    <!-- Back to Top -->
    <div class="back-to-top"><i class="fas fa-chevron-up"></i></div>
