<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Dollhouse Miniature Supply & Kit Shop</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
    
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fdfaf5;
            margin: 0;
            padding: 0;
        }
        .auth-container {
            display: flex;
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        }
        .auth-form-box {
            flex: 1;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .auth-header {
            margin-bottom: 40px;
            text-align: center;
        }
        .auth-header .logo {
            justify-content: center;
        }
        .auth-header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .social-auth {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }
        .social-btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #eee;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 600;
            transition: var(--transition);
        }
        .social-btn:hover { background: #f9f9f9; }
        
        .divider {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            color: #999;
            font-size: 0.9rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #eee;
        }
        
        .form-group { position: relative; margin-bottom: 20px; }
        .form-group input {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #ddd;
            background: #fdfdfd;
        }
        .form-group input[type="password"] {
            padding-right: 45px;
        }
        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #999;
            z-index: 10;
        }
        
        .form-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        
        @media (max-width: 576px) {
            .auth-container { width: 95%; border-radius: 20px; }
            .auth-form-box { padding: 40px 20px; }
            .auth-header h1 { font-size: 2rem; }
            .page-controls {
                top: 15px !important;
                right: 15px !important;
            }
        }
        
        /* Page Controls */
        .page-controls {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 1000;
        }
        .toggle-btn {
            background: white;
            border: 1px solid #ddd;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: var(--transition);
        }
        .toggle-btn:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
    </style>
</head>
<body>
    
    <div class="page-controls">
        <button id="dark-mode-toggle" class="toggle-btn"><i class="fas fa-moon"></i></button>
        <button id="rtl-toggle" class="toggle-btn" title="Toggle RTL"><i class="fas fa-right-left"></i></button>
    </div>

    <div class="auth-container">

        
        <div class="auth-form-box">
            <div class="auth-header">
                <a href="index.html" class="logo" style="margin-bottom: 20px; display: flex;">
                    <i class="fas fa-house-chimney-window logo-icon"></i>
                    MiniCraft Shop
                </a>
                <h1>Welcome Back</h1>
                <p style="color: #666;">Enter your details to access your creative studio.</p>
            </div>
            

            
            <form action="index.html">
                <div class="form-group">
                    <input type="email" placeholder="Email Address" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder="Password" required>
                    <i class="fas fa-eye password-toggle" onclick="togglePassword('password', this)"></i>
                </div>
                
                <div class="form-footer">
                    <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                        <input type="checkbox" style="width: auto;"> Remember me
                    </label>
                    <a href="#" style="color: var(--primary-color); font-weight: 600;">Forgot Password?</a>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 30px;">Login</button>
                
                <div class="divider">Or login with</div>
                
                <div class="social-auth">
                    <button type="button" class="social-btn"><i class="fab fa-google" style="color: #ea4335;"></i> Google</button>
                    <button type="button" class="social-btn"><i class="fab fa-apple"></i> Apple</button>
                </div>
                
                <p style="text-align: center; color: #666; margin-top: 20px;">Don't have an account? <a href="register.html" style="color: var(--primary-color); font-weight: 700;">Sign Up</a></p>
            </form>
        </div>
    </div>

    <!-- Back to Top -->
    <div class="back-to-top"><i class="fas fa-chevron-up"></i></div>

    <script>
        function togglePassword(id, icon) {
            const input = document.getElementById(id);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
    </script>
    <script src="assets/js/main.js"></script>
</body>
</html>
