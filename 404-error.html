<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <title>404 - Page Not Found | Dollhouse Miniature Shop</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: var(--bg-soft);
            overflow: hidden;
            position: relative;
        }
        .error-content h1 {
            font-size: 10rem;
            color: var(--primary-color);
            line-height: 1;
            margin-bottom: 20px;
        }
        .error-content h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        .error-content p {
            margin-bottom: 40px;
            color: #666;
            max-width: 500px;
        }
        
        .floating {
            position: absolute;
            opacity: 0.1;
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-20px) rotate(10deg); }
            100% { transform: translateY(0) rotate(0); }
        }
    </style>
</head>
<body>

    <i class="fas fa-hammer floating" style="top: 10%; left: 10%; font-size: 5rem;"></i>
    <i class="fas fa-couch floating" style="top: 20%; right: 15%; font-size: 4rem; animation-delay: 1s;"></i>
    <i class="fas fa-lightbulb floating" style="bottom: 15%; left: 20%; font-size: 6rem; animation-delay: 2s;"></i>
    <i class="fas fa-paint-brush floating" style="bottom: 20%; right: 10%; font-size: 5rem; animation-delay: 3s;"></i>

    <div class="error-content">
        <h3 class="logo" style="margin-bottom: 40px; font-size: 2rem;">MiniCraft Shop</h3>
        <h1>404</h1>
        <h2>Oops! This room is missing.</h2>
        <p>It seems the page you are looking for has been misplaced in our tiny warehouse. Let's get you back to the main house.</p>
        <a href="index.html" class="btn btn-primary">Back to Home</a>
    </div>

    <!-- Back to Top -->
    <div class="back-to-top"><i class="fas fa-chevron-up"></i></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
