<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <title>Register - Dollhouse Miniature Supply & Kit Shop</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
    
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fdfaf5;
            margin: 0;
            padding: 20px;
        }
        .auth-container {
            display: flex;
            width: 100%;
            max-width: 550px;
            background: white;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        }
        .auth-form-box {
            flex: 1;
            padding: 60px 40px;
            position: relative;
        }
        .auth-header {
            margin-bottom: 30px;
            text-align: center;
        }
        .auth-header .logo {
            justify-content: center;
        }
        .auth-header h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
        }
        .form-group { position: relative; margin-bottom: 20px; }
        .form-group input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ddd;
        }
        .form-group input[type="password"] {
            padding-right: 45px;
        }
        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #999;
            z-index: 10;
        }
        
        .social-auth {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }
        .social-btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #eee;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 600;
            transition: var(--transition);
        }
        .social-btn:hover { 
            background: #fdfdfd;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border-color: #ddd;
        }
        
        body.dark-mode .social-btn:hover {
            background: rgba(255, 255, 255, 0.08) !important;
            border-color: rgba(255, 255, 255, 0.2) !important;
        }
        
        .divider {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            color: #999;
            font-size: 0.9rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #eee;
        }
        
        @media (max-width: 991px) {
            body {
                align-items: flex-start;
                padding-top: 80px;
                height: auto;
                min-height: 100vh;
            }
            .auth-container { 
                width: 95%; 
                max-width: 550px;
                border-radius: 20px;
                margin: 0 auto 40px auto;
            }
            .auth-form-box { padding: 40px 20px; }
            .auth-header h1 { font-size: 1.8rem; }
            .page-controls {
                top: 20px !important;
                right: 20px !important;
            }
        }
        
        /* Page Controls */
        .page-controls {
            position: fixed;
            top: 25px;
            right: 25px;
            display: flex;
            gap: 12px;
            z-index: 1000;
        }
        .toggle-btn {
            background: white;
            border: 1px solid #ddd;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: var(--transition);
        }
        .toggle-btn:hover {
            background: var(--primary-color);
            color: white;
            transform: translateY(-3px);
            border-color: var(--primary-color);
        }
    </style>
</head>
<body>
    
    <div class="page-controls">
        <button class="toggle-btn dark-mode-toggle" title="Toggle Theme"><i class="fas fa-moon"></i></button>
        <button class="toggle-btn rtl-toggle" title="Toggle RTL"><i class="fas fa-right-left"></i></button>
    </div>

    <div class="auth-container">
        <div class="auth-form-box">
            <div class="auth-header">
                <a href="index.html" class="logo" style="margin-bottom: 20px; display: flex;">
                    <i class="fas fa-house-chimney-window logo-icon"></i>
                    MiniCraft Shop
                </a>
                <h1>Start Your Journey</h1>
                <p style="color: #666;">Create your free account today.</p>
            </div>
            
            <form action="index.html">
                <div class="form-group">
                    <input type="text" placeholder="First Name" required>
                </div>
                <div class="form-group">
                    <input type="text" placeholder="Last Name" required>
                </div>
                <div class="form-group">
                    <input type="email" placeholder="Email Address" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder="Create Password" required>
                    <i class="fas fa-eye password-toggle" onclick="togglePassword('password', this)"></i>
                </div>
                <div class="form-group">
                    <input type="password" id="confirm_password" placeholder="Confirm Password" required>
                    <i class="fas fa-eye password-toggle" onclick="togglePassword('confirm_password', this)"></i>
                </div>
                
                <label style="display: flex; align-items: flex-start; gap: 10px; cursor: pointer; margin-bottom: 30px; font-size: 0.9rem; color: #666;">
                    <input type="checkbox" style="width: auto; margin-top: 3px;" required>
                    <span>I agree to the <a href="#" style="color: var(--primary-color);">Terms of Service</a> and <a href="#" style="color: var(--primary-color);">Privacy Policy</a>.</span>
                </label>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 30px;">Create Account</button>
                
                <div class="divider">Or register with</div>
                
                <div class="social-auth">
                    <button type="button" class="social-btn"><i class="fab fa-google" style="color: #ea4335;"></i> Google</button>
                    <button type="button" class="social-btn"><i class="fab fa-apple"></i> Apple</button>
                </div>
                
                <p style="text-align: center; color: #666; margin-top: 20px;">Already a member? <a href="login.html" style="color: var(--primary-color); font-weight: 700;">Login</a></p>
            </form>
        </div>
    </div>

    <!-- Back to Top -->
    <div class="back-to-top"><i class="fas fa-chevron-up"></i></div>


    <script>
        function togglePassword(id, icon) {
            const input = document.getElementById(id);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
    </script>
    <script src="assets/js/main.js"></script>
</body>
</html>
